<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fork Scanner — Reports</title>
<style>
:root{--bg:#f8f9fa;--surface:#fff;--text:#1a1a2e;--text-secondary:#555;--border:#dee2e6;--accent:#4361ee;--accent-light:#eef0ff;--green:#2ec4b6}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f23;--surface:#1a1a2e;--text:#eaeaea;--text-secondary:#9ca3af;--border:#2d2d44;--accent:#5e7ce2;--accent-light:#1a1a3e}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1000px;margin:0 auto;padding:48px 24px;text-align:center}
h1{font-size:2.5rem;margin-bottom:8px}
.subtitle{color:var(--text-secondary);margin-bottom:48px;font-size:1.1rem}
.repo-list{display:grid;gap:16px;text-align:left}
.repo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;transition:border-color .2s}
.repo-card:hover{border-color:var(--accent)}
.repo-name{font-size:1.1rem;font-weight:700}
.repo-meta{color:var(--text-secondary);font-size:0.85rem}
.repo-links{display:flex;gap:8px}
.repo-links a{padding:6px 14px;border-radius:6px;background:var(--accent-light);color:var(--accent);text-decoration:none;font-size:0.85rem;font-weight:600}
.repo-links a:hover{background:var(--accent);color:#fff}
.empty{color:var(--text-secondary);font-size:1.1rem;padding:48px}
</style>
</head>
<body>
<div class="container">
<h1>🔬 Fork Scanner Reports</h1>
<div class="subtitle">Community fork analysis for open source projects</div>
<div class="repo-list" id="repoList"></div>
<div class="footer" style="margin-top:48px;color:var(--text-secondary);font-size:0.85rem">
Generated by fork-scanner · {{DATE}}
</div>
</div>
<script>
window.__REPOS__ = {{REPOS_JSON}};

const list = document.getElementById("repoList");
const repos = window.__REPOS__;

if (!repos || repos.length === 0) {
  list.innerHTML = '<div class="empty">No reports generated yet.</div>';
} else {
  list.innerHTML = repos.map(r => `
    <div class="repo-card">
      <div>
        <div class="repo-name">${esc(r.name)}</div>
        <div class="repo-meta">${r.forks} forks · ${r.interesting} interesting · ${r.date}</div>
      </div>
      <div class="repo-links">
        <a href="${r.stage1 || r.dir + '/report-stage1.html'}">Stage 1</a>
        ${r.stage2 ? '<a href="'+r.stage2+'">Stage 2</a>' : ''}
      </div>
    </div>
  `).join('');
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
</script>
</body>
</html>

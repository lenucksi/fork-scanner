<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fork Analysis — Stage 1</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f8f9fa;--surface:#fff;--text:#1a1a2e;--text-secondary:#555;--border:#dee2e6;--accent:#4361ee;--accent-light:#eef0ff;--green:#2ec4b6;--orange:#ff9f1c;--purple:#7209b7}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f23;--surface:#1a1a2e;--text:#eaeaea;--text-secondary:#9ca3af;--border:#2d2d44;--accent:#5e7ce2;--accent-light:#1a1a3e}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:24px}
h1{font-size:2rem;margin-bottom:4px}
h2{font-size:1.4rem;margin:32px 0 16px;border-bottom:2px solid var(--accent);padding-bottom:8px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700}
.stat-card .label{font-size:0.85rem;color:var(--text-secondary)}
.charts-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:32px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-card canvas{max-height:280px}
table{width:100%;border-collapse:collapse;margin:12px 0 24px;font-size:0.88rem}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
th{background:var(--accent-light);font-weight:600}
tr:hover{background:var(--accent-light)}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.75rem;background:var(--accent-light);color:var(--accent)}
.pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:0.78rem;font-weight:600}
.pill-human{background:#d4edda;color:#155724}.pill-bot{background:#e2e3e5;color:#383d41}
details{margin:8px 0}
details summary{cursor:pointer;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-weight:600}
details[open] summary{border-radius:8px 8px 0 0}
details .body{background:var(--surface);border:1px solid var(--border);border-top:none;padding:12px;border-radius:0 0 8px 8px}
</style></head>
<body>
<div class="container">

<h1>Fork Analysis — Stage 1</h1>
<p style="color:var(--text-secondary);margin-bottom:24px">{{TOTAL_FORKS}} forks &middot; {{REPO}} &middot; {{DATE}}</p>

<div class="stats-grid" id="statsGrid"></div>
<div class="charts-row">
  <div class="chart-card"><h3>Fork Status</h3><canvas id="statusChart"></canvas></div>
  <div class="chart-card"><h3>Last Push Activity</h3><canvas id="pushedChart"></canvas></div>
</div>

<h2>Interesting Forks</h2>
<p style="color:var(--text-secondary);margin-bottom:12px" id="interestingCount"></p>
<div style="overflow-x:auto"><table><thead><tr>
<th>Fork</th><th>Pushed</th><th>Branches</th><th>Ahead</th><th>Behind</th><th>Files</th><th>Lines</th>
</tr></thead><tbody id="forkTableBody"></tbody></table></div>

</div>

<script>
window.__DATA__ = {{DATA_JSON}};

const D = window.__DATA__;
const statusColors = {identical:"#6c757d",behind:"#ff9f1c",aheadBot:"#adb5bd",aheadHuman:"#2ec4b6"};

document.getElementById("statsGrid").innerHTML = Object.entries(D.stats).map(([k,v]) =>
  `<div class="stat-card"><div class="num" style="color:${statusColors[k]||'var(--accent)'}">${v}</div><div class="label">${k}</div></div>`
).join("");

document.getElementById("interestingCount").textContent = D.interesting.length + " forks with human-authored changes ahead of upstream";

document.getElementById("forkTableBody").innerHTML = D.interesting.map(f => {
  const allFiles = f.branches.flatMap(b => b.files || []);
  const adds = allFiles.reduce((s,f2) => s+(f2.additions||0),0);
  const dels = allFiles.reduce((s,f2) => s+(f2.deletions||0),0);
  return `<tr>
    <td><a href="https://github.com/${esc(f.full_name)}" target="_blank"><strong>${esc(f.full_name)}</strong></a></td>
    <td>${f.pushed_at ? new Date(f.pushed_at).toISOString().slice(0,10) : "?"}</td>
    <td>${f.branches.map(b => `<span style="font-family:monospace;font-size:0.8rem">${esc(b.branch)}</span> <span class="badge">+${b.ahead_by}/-${b.behind_by}</span>`).join(" ")}</td>
    <td>+${f.max_ahead}</td><td>-${f.max_behind}</td>
    <td>${allFiles.length}</td>
    <td>+${adds}/-${dels}</td></tr>`;
}).join("");

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

new Chart(document.getElementById("statusChart"),{
  type:"doughnut",
  data:{labels:["Identical","Behind","Ahead (Bot)","Ahead (Human)"],
    datasets:[{data:[D.stats.identical,D.stats.behind,D.stats.aheadBot,D.stats.aheadHuman],
    backgroundColor:["#6c757d","#ff9f1c","#adb5bd","#2ec4b6"],borderWidth:0}]},
  options:{responsive:true,plugins:{legend:{position:"bottom"}}}
});

new Chart(document.getElementById("pushedChart"),{
  type:"bar",
  data:{labels:D.pushedLabels,datasets:[{data:D.pushedValues,
    backgroundColor:["#4361ee","#7209b7","#ff9f1c","#e71d36","#6c757d","#adb5bd"],borderRadius:6}]},
  options:{responsive:true,plugins:{legend:{display:false}},
    scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
});
</script>
</body>
</html>
